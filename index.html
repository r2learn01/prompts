<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* الألوان المستوحاة من الصورة (الثيم الداكن) */
            --bg-color: #151828; 
            --header-bg: #151828;
            --text-color: #ffffff;
            --logo-color: #a855f7; /* لون اللوجو البنفسجي */
            --title-color: #d946ef; /* لون العناوين الوردي/البنفسجي */
            --border-color: #374151; /* لون حدود الأزرار */
            --overlay-color: rgba(21, 24, 40, 0.75); /* طبقة شفافة فوق الفيديو */
        }

        [data-theme="light"] {
            /* متغيرات الثيم الفاتح */
            --bg-color: #f8fafc;
            --header-bg: #ffffff;
            --text-color: #0f172a;
            --logo-color: #7e22ce;
            --title-color: #c026d3;
            --border-color: #cbd5e1;
            --overlay-color: rgba(248, 250, 252, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Header (شريط التنقل) */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--logo-color);
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .nav-links a:hover {
            color: var(--logo-color);
        }

        /* أزرار الهيدر (الترجمة والثيم) */
        .controls {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn i {
            color: #fbbf24; /* لون الشمس الأصفر */
        }

        .header-btn:hover {
            border-color: var(--text-color);
        }

        /* الفيديو في الخلفية */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-color);
        }

        /* محتوى الصفحة الرئيسية */
        .hero-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .hero-content h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            color: var(--title-color);
            font-weight: 900;
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 40px;
            max-width: 700px;
            line-height: 1.6;
        }

        /* أزرار الخدمات في المنتصف */
        .buttons-container {
            display: flex;
            gap: 20px;
        }

        .main-btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-fill {
            background: var(--logo-color);
            color: #fff;
            border: 1px solid var(--logo-color);
        }

        .btn-fill:hover {
            background: var(--title-color);
            border-color: var(--title-color);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-outline:hover {
            border-color: var(--logo-color);
            color: var(--logo-color);
        }

        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-wrap: wrap; justify-content: center; gap: 15px; }
            .nav-links { width: 100%; justify-content: center; margin-bottom: 10px; }
            .hero-content h1 { font-size: 2.5rem; }
            .buttons-container { flex-direction: column; width: 100%; max-width: 300px; }
            .main-btn { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">R2 AI</a>
        <nav class="nav-links">
            <a href="index.html" data-i18n="nav_home">Home</a>
            <a href="about.html" data-i18n="nav_about">About Us</a>
            <a href="privacy.html" data-i18n="nav_privacy">Privacy Policy</a>
        </nav>
        <div class="controls">
            <button class="header-btn" id="theme-toggle" onclick="toggleTheme()">
                <i class="fas fa-sun"></i> <span id="theme-text" data-i18n="theme_light">Light</span>
            </button>
            <button class="header-btn" id="lang-toggle" onclick="toggleLanguage()">
                <span id="lang-text">العربية</span>
            </button>
        </div>
    </header>

    <div class="video-container">
        <div class="overlay"></div>
        <video id="bg-video" autoplay loop muted playsinline>
            </video>
    </div>

    <main class="hero-content">
        <h1 data-i18n="hero_title">R2 AI Platform</h1>
        <p data-i18n="hero_desc">Your ultimate hub for AI prompts and powerful free tools. Boost your creativity and productivity instantly.</p>
        
        <div class="buttons-container">
            <a href="prompt.html" class="main-btn btn-fill">
                <i class="fas fa-terminal"></i> <span data-i18n="btn_prompts">Prompts Library</span>
            </a>
            <a href="blog.html" class="main-btn btn-outline">
                <i class="fas fa-magic"></i> <span data-i18n="btn_tools">Free AI Tools</span>
            </a>
        </div>
    </main>

    <script>
        // 1. تشغيل فيديو عشوائي
        const videos = [
            "https://cdn.pixabay.com/video/2023/10/22/186105-877134005_large.mp4",
            "https://cdn.pixabay.com/video/2023/08/24/177436-857321590_large.mp4"
        ];
        document.getElementById('bg-video').src = videos[Math.floor(Math.random() * videos.length)];

        // 2. نظام الثيمات (Dark/Light)
        const htmlElement = document.documentElement;
        const themeIcon = document.querySelector('#theme-toggle i');
        
        if(localStorage.getItem('theme') === 'light') {
            htmlElement.setAttribute('data-theme', 'light');
            themeIcon.className = 'fas fa-moon';
        }

        function toggleTheme() {
            const isDark = htmlElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            themeIcon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
            
            // تحديث نص زر الثيم حسب اللغة الحالية
            const currentLang = localStorage.getItem('lang') || 'en';
            const textKey = newTheme === 'light' ? 'theme_dark' : 'theme_light';
            document.getElementById('theme-text').innerText = translations[currentLang][textKey];
        }

        // 3. نظام الترجمة (الافتراضي إنجليزي)
        const translations = {
            en: {
                nav_home: "Home",
                nav_about: "About Us",
                nav_privacy: "Privacy Policy",
                theme_light: "Light",
                theme_dark: "Dark",
                lang_btn: "العربية",
                hero_title: "R2 AI Platform",
                hero_desc: "Your ultimate hub for AI prompts and powerful free tools. Boost your creativity and productivity instantly.",
                btn_prompts: "Prompts Library",
                btn_tools: "Free AI Tools"
            },
            ar: {
                nav_home: "الرئيسية",
                nav_about: "عن الموقع",
                nav_privacy: "سياسة الخصوصية",
                theme_light: "فاتح",
                theme_dark: "داكن",
                lang_btn: "English",
                hero_title: "منصة R2 للذكاء الاصطناعي",
                hero_desc: "بوابتك الشاملة لأفضل البرومبتات وأقوى أدوات الذكاء الاصطناعي المجانية التي ستضاعف إنتاجيتك وتختصر وقتك.",
                btn_prompts: "مكتبة البرومبتات",
                btn_tools: "أفضل الأدوات المجانية"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';
        applyTranslation(currentLang);

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('lang', currentLang);
            applyTranslation(currentLang);
        }

        function applyTranslation(lang) {
            htmlElement.lang = lang;
            htmlElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    element.innerText = translations[lang][key];
                }
            });
            
            document.getElementById('lang-text').innerText = translations[lang].lang_btn;
            
            // تحديث نص الثيم بناءً على الحالة الحالية
            const currentTheme = htmlElement.getAttribute('data-theme');
            const themeKey = currentTheme === 'dark' ? 'theme_light' : 'theme_dark';
            document.getElementById('theme-text').innerText = translations[lang][themeKey];
        }
    </script>
</body>
</html>
