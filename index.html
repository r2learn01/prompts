<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2Learn - دليلك للذكاء الاصطناعي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* متغيرات الثيم الداكن (الافتراضي) */
            --bg-color: #0f0f13;
            --text-color: #ffffff;
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --nav-bg: rgba(15, 15, 19, 0.85);
            --overlay-color: rgba(0, 0, 0, 0.65);
        }

        [data-theme="light"] {
            /* متغيرات الثيم الفاتح */
            --bg-color: #f4f4f9;
            --text-color: #1a1a1a;
            --primary-color: #0078d7;
            --secondary-color: #00b4d8;
            --nav-bg: rgba(255, 255, 255, 0.9);
            --overlay-color: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* لمنع التمرير في الصفحة الرئيسية */
        }

        /* شريط التنقل (Header) */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary-color);
            text-decoration: none;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            margin: 0 15px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        .controls button {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 15px;
        }

        .controls button:hover {
            color: var(--primary-color);
        }

        /* خلفية الفيديو */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: -1;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-color);
        }

        /* المحتوى الرئيسي (Hero Section) */
        .hero-content {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .hero-content h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.5rem;
            margin-bottom: 40px;
            max-width: 800px;
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        /* الأزرار */
        .buttons-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 30px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: #fff;
            border: none;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        /* الموبايل */
        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-wrap: wrap; }
            .nav-links { display: none; } /* يمكن إضافة قائمة هامبرغر لاحقاً */
            .hero-content h1 { font-size: 2.5rem; }
            .hero-content p { font-size: 1.1rem; }
            .buttons-container { flex-direction: column; width: 100%; max-width: 300px; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">R2Learn</a>
        <nav class="nav-links">
            <a href="index.html" data-i18n="nav_home">الرئيسية</a>
            <a href="prompt.html" data-i18n="nav_prompts">مكتبة البرومبتات</a>
            <a href="blog.html" data-i18n="nav_tools">أدوات الذكاء الاصطناعي</a>
            <a href="about.html" data-i18n="nav_about">عن الموقع</a>
        </nav>
        <div class="controls">
            <button id="lang-toggle" onclick="toggleLanguage()"><i class="fas fa-globe"></i> <span id="lang-text">EN</span></button>
            <button id="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="video-container">
        <div class="overlay"></div>
        <video id="bg-video" autoplay loop muted playsinline>
            </video>
    </div>

    <main class="hero-content">
        <h1 data-i18n="hero_title">اكتشف قوة الذكاء الاصطناعي</h1>
        <p data-i18n="hero_desc">بوابتك الشاملة لأفضل البرومبتات وأقوى أدوات الذكاء الاصطناعي المجانية التي ستضاعف إنتاجيتك وتختصر وقتك.</p>
        
        <div class="buttons-container">
            <a href="prompt.html" class="btn btn-primary">
                <i class="fas fa-terminal"></i> <span data-i18n="btn_prompts">تصفح البرومبتات</span>
            </a>
            <a href="blog.html" class="btn btn-outline">
                <i class="fas fa-magic"></i> <span data-i18n="btn_tools">أفضل الأدوات المجانية</span>
            </a>
        </div>
    </main>

    <script>
        // 1. نظام تشغيل فيديو عشوائي
        const videos = [
            // ضع روابط فيديوهات قصيرة تعبر عن الذكاء الاصطناعي هنا (روابط مباشرة mp4)
            "https://cdn.pixabay.com/video/2023/10/22/186105-877134005_large.mp4", // فيديو مثال 1
            "https://cdn.pixabay.com/video/2023/08/24/177436-857321590_large.mp4"  // فيديو مثال 2
        ];
        
        const videoElement = document.getElementById('bg-video');
        const randomVideo = videos[Math.floor(Math.random() * videos.length)];
        videoElement.src = randomVideo;

        // 2. نظام الثيمات (Dark/Light)
        const themeToggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;

        // التحقق من الثيم المحفوظ
        if(localStorage.getItem('theme') === 'light') {
            htmlElement.setAttribute('data-theme', 'light');
            themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }

        function toggleTheme() {
            if (htmlElement.getAttribute('data-theme') === 'dark') {
                htmlElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
                themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                htmlElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }

        // 3. نظام الترجمة المدمج (العربية / الإنجليزية)
        const translations = {
            ar: {
                nav_home: "الرئيسية",
                nav_prompts: "مكتبة البرومبتات",
                nav_tools: "أدوات الذكاء الاصطناعي",
                nav_about: "عن الموقع",
                hero_title: "اكتشف قوة الذكاء الاصطناعي",
                hero_desc: "بوابتك الشاملة لأفضل البرومبتات وأقوى أدوات الذكاء الاصطناعي المجانية التي ستضاعف إنتاجيتك وتختصر وقتك.",
                btn_prompts: "تصفح البرومبتات",
                btn_tools: "أفضل الأدوات المجانية",
                lang_btn: "EN"
            },
            en: {
                nav_home: "Home",
                nav_prompts: "Prompts Library",
                nav_tools: "AI Tools",
                nav_about: "About",
                hero_title: "Discover the Power of AI",
                hero_desc: "Your comprehensive gateway to the best prompts and free AI tools that will multiply your productivity.",
                btn_prompts: "Browse Prompts",
                btn_tools: "Best Free Tools",
                lang_btn: "AR"
            }
        };

        let currentLang = localStorage.getItem('lang') || 'ar';
        applyTranslation(currentLang);

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('lang', currentLang);
            applyTranslation(currentLang);
        }

        function applyTranslation(lang) {
            htmlElement.lang = lang;
            htmlElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang][key]) {
                    element.innerText = translations[lang][key];
                }
            });
            document.getElementById('lang-text').innerText = translations[lang].lang_btn;
        }
    </script>
</body>
</html>
