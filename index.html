<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R2 AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* الألوان الأصلية */
            --bg-color: #0f0f13;
            --text-color: #ffffff;
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --nav-bg: rgba(15, 15, 19, 0.9);
            --overlay-color: rgba(0, 0, 0, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        [data-theme="Light"] {
            --bg-color: #f4f4f9;
            --text-color: #1a1a1a;
            --primary-color: #0078d7;
            --secondary-color: #00b4d8;
            --nav-bg: rgba(255, 255, 255, 0.95);
            --overlay-color: rgba(255, 255, 255, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.3rem;
        }

        .nav-links a:hover {
            color: var(--primary-color);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 12px;
        }

        .control-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 7px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* Video Background */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-color);
        }

        /* Main Content */
        .hero-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            z-index: 10;
        }

        .hero-content h1 {
            font-size: 3.8rem;
            margin-bottom: 20px;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-content p {
            font-size: 1.3rem;
            max-width: 750px;
            margin-bottom: 40px;
            line-height: 1.6;
            opacity: 0.9;
        }

        /* Main Action Buttons */
        .btn-group {
            display: flex;
            gap: 20px;
        }

        .main-btn {
            padding: 14px 35px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s transform ease;
        }

        .btn-fill {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
        }

        .btn-outline {
            background: transparent;
            color: var(--text-color);
            border: 2px solid var(--primary-color);
        }

        .main-btn:hover {
            transform: translateY(-5px);
        }

        /* Social Media Footer */
        footer {
            position: relative;
            bottom: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            z-index: 10;
        }

        .social-link {
            color: var(--text-color);
            font-size: 1.8rem;
            text-decoration: none;
            opacity: 0.7;
            transition: 0.3s;
        }

        .social-link:hover {
            opacity: 1;
            color: var(--primary-color);
            transform: scale(1.2);
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 10px; }
            .hero-content h1 { font-size: 2.5rem; }
            .btn-group { flex-direction: column; width: 100%; max-width: 300px; }
            .main-btn { justify-content: center; }
            footer { gap: 20px; }
        }
    </style>

    <!-- Ads  -->
    <script src="https://pl28754091.effectivegatecpm.com/40/c4/5e/40c45e7275b21265a9070e0e4d2ba503.js"></script>
    
</head>
<body>

    <header>
        <a href="index.html" class="logo">R2 AI</a>
        <nav class="nav-links">
            <a href="about.html" data-i18n="nav_about">About Us</a>
            <a href="privacy.html" data-i18n="nav_privacy">Privacy Policy</a>
        </nav>
        <div class="controls">
            <button class="control-btn" onclick="toggleTheme()">
                <i id="theme-icon" class="fas fa-moon"></i>
                <span id="theme-text" data-i18n="theme_dark">Dark</span>
            </button>
            <button class="control-btn" onclick="toggleLanguage()">
                <i class="fas fa-globe"></i>
                <span id="lang-text">العربية</span>
            </button>
        </div>
    </header>

    <div class="video-container">
        <div class="overlay"></div>
        <video id="bg-video" autoplay loop muted playsinline></video>
    </div>

    <main class="hero-content">
        <h1 data-i18n="hero_title">R2 AI Platform</h1>
        <p data-i18n="hero_desc">Explore the future of productivity with our curated library of AI prompts and premium free tools designed for creators.</p>
        
        <div class="btn-group">
            <a href="prompt.html" class="main-btn btn-fill">
                <i class="fas fa-terminal"></i> <span data-i18n="btn_prompts">Prompts Library</span>
            </a>
            <a href="blog.html" class="main-btn btn-outline">
                <i class="fas fa-magic"></i> <span data-i18n="btn_tools">Free AI Tools</span>
            </a>
        </div>
    </main>

    <!-- <footer>
        <a href="https://facebook.com/hazem.atta.98" class="social-link" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://instagram.com/hazem.py" class="social-link" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://t.me/hazem_py" class="social-link" target="_blank"><i class="fab fa-telegram"></i></a>
    </footer> -->

    <script>
        // 1. Random Video Logic
        const videos = [
            "https://cdn.pixabay.com/video/2023/10/22/186105-877134005_large.mp4",
            "https://cdn.pixabay.com/video/2023/08/24/177436-857321590_large.mp4"
        ];
        document.getElementById('bg-video').src = videos[Math.floor(Math.random() * videos.length)];

        // 2. Theme Logic
        const html = document.documentElement;
        function toggleTheme() {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        }

        function updateThemeUI(theme) {
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            const isDark = theme === 'dark';
            icon.className = isDark ? 'fas fa-moon':'fas fa-sun' ;
            const lang = localStorage.getItem('lang') || 'en';
            text.innerText = translations[lang][isDark ? 'theme_dark' : 'theme_light'];
        }

        // 3. Translation Logic
        const translations = {
            en: {
                nav_about: "About Us",
                nav_privacy: "Privacy Policy",
                theme_dark: "Light",
                theme_light: "Dark",
                hero_title: "R2 AI Platform",
                hero_desc: "Explore the future of productivity with our curated library of AI prompts and premium free tools designed for creators.",
                btn_prompts: "Prompts Library",
                btn_tools: "AI Tools Hub",
                lang_btn: "العربية"
            },
            ar: {
                nav_about: "من نحن",
                nav_privacy: "سياسة الخصوصية",
                theme_dark: "فاتح",
                theme_light: "داكن",
                hero_title: "منصة R2 للذكاء الاصطناعي",
                hero_desc: "استكشف مستقبل الإنتاجية من خلال مكتبتنا المنسقة لبرومبتات الذكاء الاصطناعي وأدواتنا المجانية المصممة للمبدعين.",
                btn_prompts: "مكتبة البرومبتات",
                btn_tools: "مركز الأدوات",
                lang_btn: "English"
            }
        };

        function toggleLanguage() {
            const currentLang = localStorage.getItem('lang') || 'en';
            const newLang = currentLang === 'en' ? 'ar' : 'en';
            localStorage.setItem('lang', newLang);
            applyLanguage(newLang);
        }

        function applyLanguage(lang) {
            html.lang = lang;
            html.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = translations[lang][key];
            });
            document.getElementById('lang-text').innerText = translations[lang].lang_btn;
            updateThemeUI(html.getAttribute('data-theme'));
        }

        // Initialize
        const savedTheme = localStorage.getItem('theme') || 'dark';
        const savedLang = localStorage.getItem('lang') || 'en';
        html.setAttribute('data-theme', savedTheme);
        applyLanguage(savedLang);
    </script
      
</body>
</html>
